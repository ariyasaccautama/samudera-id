<!-- CUSTOM CHAT BUTTON -->
<button id="samudera-chat-button">
  <img
    src="https://i.ibb.co.com/JFFXhhbF/samudera.jpg"
    alt="Chat">
</button>

<style>
#samudera-chat-button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 80px;
  height: 80px;
  border: none;
  background: transparent;
  cursor: pointer;
  z-index: 999999;
}

#samudera-chat-button img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
</style>

<script>
function initEmbeddedMessaging() {
  try {

    embeddedservice_bootstrap.settings.hideChatButtonOnLoad = true;
    embeddedservice_bootstrap.settings.language = 'en_US';

    embeddedservice_bootstrap.init(
      '00DHu00000Srzsm',
      'TSC_Web_Samudera_Indonesia',
      'https://treessolutionseve25.my.site.com/ESWTSCWebSamuderaIndon1781758211576',
      {
        scrt2URL: 'https://treessolutionseve25.my.salesforce-scrt.com'
      }
    );

  } catch (err) {
    console.error(err);
  }
}

document.addEventListener('DOMContentLoaded', () => {

  document
    .getElementById('samudera-chat-button')
    .addEventListener('click', async () => {

      try {

        if (
          window.embeddedservice_bootstrap &&
          embeddedservice_bootstrap.utilAPI &&
          embeddedservice_bootstrap.utilAPI.launchChat
        ) {

          await embeddedservice_bootstrap.utilAPI.launchChat();

        } else {

          console.log('launchChat API not available');
          console.log(embeddedservice_bootstrap);

        }

      } catch (e) {

        console.error(e);

      }

    });

});
</script>

<script
  src="https://treessolutionseve25.my.site.com/ESWTSCWebSamuderaIndon1781758211576/assets/js/bootstrap.min.js"
  onload="initEmbeddedMessaging()">
</script>
